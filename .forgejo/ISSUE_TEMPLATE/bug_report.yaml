name: Issue Report
description: Report an issue
labels: [bug]
body:

  - type: textarea
    id: reproduce-steps
    attributes:
      label: Steps to reproduce
      description: Provide an example of the issue.
      placeholder: |
        Example:
          1. First step
          2. Second step
          3. Issue here
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      placeholder: |
        Example:
          "This should happen..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      placeholder: |
        Example:
          "This happened instead..."
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: Self.Tube version
      description: |
        You can find your Self.Tube version in the **About** Section.
      placeholder: |
        Example: "0.1.2"
    validations:
      required: true

  - type: input
    id: os-info
    attributes:
      label: Operating System and Version
      description: |
        Include the operating system and version you are using.
      placeholder: |
        Example: "Android 16, Debian 13, Custom ROM (if any)"
    validations:
      required: true

  - type: input
    id: hw-info
    attributes:
      label: Device Model
      description: |
        The model of your device or computer.
      placeholder: |
        Example: "Pixel 7 Pro, Fairphone 5, PinePhone Pro, ..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (optional)
      description: Attach logs if available.
      placeholder: |
        Paste logs from Logcat or your terminal here (if available)
      render: shell

  - type: textarea
    id: other-details
    attributes:
      label: Other details
      placeholder: |
        Additional details and attachments.

  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      description: Your issue will be closed if you haven't done these steps.
      options:
        - label: I have searched the existing issues and this is a new issue, **NOT** a duplicate or related to another open issue.
          required: true
        - label: I am using the most recent Version of Self.Tube
          required: true
